<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}{{ site_config.site_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ base_path }}/styles.css" />
  <meta name="description" content="{% block desc %}{{ site_config.site_subtagline }}{% endblock %}" />
  <script>
    // 어드민 모드 — ?admin=1일 때만 admin.css/js를 로드
    (function () {
      try {
        var p = new URLSearchParams(location.search);
        if (p.get("admin") !== "1") return;
        var l = document.createElement("link");
        l.rel = "stylesheet"; l.href = "{{ base_path }}/admin.css";
        document.head.appendChild(l);
        var s = document.createElement("script");
        s.src = "{{ base_path }}/admin.js"; s.defer = true;
        document.head.appendChild(s);
      } catch (e) { console.error("[admin] loader error", e); }
    })();
  </script>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a href="{{ base_path }}/index.html" class="brand" data-edit-field="site_config:site_name">{{ site_config.site_name }}</a>
      <nav class="site">
        <a href="{{ base_path }}/index.html">홈</a>
      </nav>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="site">
    <div class="wrap">
      {% if site_config.footer_html %}
        {{ site_config.footer_html | safe }}
      {% else %}
        <div>© 2026 — AI 에이전트와 함께 만든 페이지 · 자동 빌드</div>
      {% endif %}
    </div>
  </footer>
</body>
</html>
