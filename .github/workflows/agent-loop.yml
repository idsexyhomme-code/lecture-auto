name: Agent Loop

on:
  workflow_dispatch:        # 수동 실행 (첫 테스트 · 디버그)
  schedule:
    - cron: "*/10 * * * *"  # 10분마다 실행 (콜백 폴링 + 빌드)

concurrency:
  group: agent-loop
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  loop:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LOG_LEVEL: INFO
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # 1) briefs/*.json → pending/ 결과물 생성
      - name: Run agents on pending briefs
        run: python -m agents.conductor

      # 2) pending 새 항목을 텔레그램으로 발송
      - name: Send approval cards
        run: python -m telegram_bot.notify

      # 3) 텔레그램 콜백 폴링 → approved/rejected 이동
      - name: Poll Telegram callbacks
        run: python -m telegram_bot.poll

      # 4) approved/ 기준으로 사이트 빌드
      - name: Build static site
        run: python -m site_builder.build

      # 5) 변경사항 커밋·푸시 (있을 때만)
      - name: Commit state changes
        run: |
          git config user.name "agent-bot"
          git config user.email "agent-bot@users.noreply.github.com"
          git add briefs/ content/ site/
          if ! git diff --cached --quiet; then
            git commit -m "agent-loop: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "no changes to commit"
          fi

      # 6) GitHub Pages 배포
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
