<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>[V1] 에디토리얼 모던 — 시안 미리보기</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* 시안용 inline 토큰 — 본 사이트 토큰을 덮어씀 */
  :root {
    --bg: #FBF8F3;
    --fg: #1A1714;
    --muted: #7A6E64;
    --line: #DDD5C8;
    --brand: #3B2A1A;
    --accent: #A67C52;
    --soft: #EDE5D8;
    --font-family-sans: 'Pretendard', system-ui, sans-serif;
    --radius-card: 12px;
  }
  body { margin:0; padding:0; }
  .design-preview-banner {
    position:sticky; top:0; z-index:100;
    background:#111; color:#fff; padding:8px 16px;
    font:13px/1.4 system-ui, sans-serif;
    border-bottom:1px solid #333;
    display:flex; justify-content:space-between; align-items:center;
  }
  .design-preview-banner .vid { background:#FFD600; color:#111; padding:2px 8px; border-radius:4px; font-weight:700; }
  .design-preview-stage { padding:48px 0; background:var(--bg, #fff); min-height:80vh; }
  .design-preview-stage > .wrap { max-width:1100px; margin:0 auto; padding:0 24px; }
</style>
</head>
<body>
<div class="design-preview-banner">
  <span><span class="vid">V1</span> · 에디토리얼 모던 · <em style="opacity:.7">차분한 학술 매거진 같은 진중함 — 텍스트 우선, 여백이 말을 걸다</em></span>
  <span style="opacity:.6">target: hero</span>
</div>
<section class="design-preview-stage" role="region" aria-label="디자인 시안 미리보기">
  <div class="wrap">
<div class="wrap" style="max-width:1120px;margin:0 auto;padding:80px 40px 88px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;">
  <div style="">
    <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent,#A67C52);margin:0 0 20px;'>Core Campus · Series Lecture</p>
    <h1 style='font-family:"Pretendard",system-ui,sans-serif;font-size:clamp(36px,4.5vw,56px);font-weight:700;line-height:1.18;letter-spacing:-0.025em;color:var(--fg,#1A1714);margin:0 0 28px;'>Claude를 실무에<br>단단하게 연결하는<br><em style="font-style:italic;color:var(--brand,#3B2A1A);">단계별 시리즈 강의</em></h1>
    <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:17px;line-height:1.72;color:#5A4E42;margin:0 0 40px;max-width:440px;'>막연하게 써보는 AI가 아니라, 1인 사업에 실제로 작동하는 구조를 만듭니다.<br>코어 캠퍼스는 개념이 아닌 실행을 가르칩니다.</p>
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;">
      <a href="/courses" style='display:inline-block;background:var(--brand,#3B2A1A);color:#FBF8F3;font-family:"Pretendard",system-ui,sans-serif;font-size:15px;font-weight:600;text-decoration:none;padding:14px 32px;border-radius:6px;letter-spacing:0.01em;'>강의 살펴보기</a>
      <a href="/about" style='display:inline-block;color:var(--brand,#3B2A1A);font-family:"Pretendard",system-ui,sans-serif;font-size:15px;font-weight:500;text-decoration:none;border-bottom:1.5px solid var(--accent,#A67C52);padding-bottom:2px;'>코어 캠퍼스란?</a>
    </div>
    <div style="display:flex;gap:32px;margin-top:48px;padding-top:32px;border-top:1px solid #DDD5C8;">
      <div>
        <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:26px;font-weight:700;color:var(--brand,#3B2A1A);margin:0 0 4px;'>14+</p>
        <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:13px;color:#7A6E64;margin:0;'>단계별 강의</p>
      </div>
      <div style="width:1px;background:#DDD5C8;"></div>
      <div>
        <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:26px;font-weight:700;color:var(--brand,#3B2A1A);margin:0 0 4px;'>3,200+</p>
        <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:13px;color:#7A6E64;margin:0;'>수강 중인 1인 사업가</p>
      </div>
      <div style="width:1px;background:#DDD5C8;"></div>
      <div>
        <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:26px;font-weight:700;color:var(--brand,#3B2A1A);margin:0 0 4px;'>4.9</p>
        <p style='font-family:"Pretendard",system-ui,sans-serif;font-size:13px;color:#7A6E64;margin:0;'>평균 수강 만족도</p>
      </div>
    </div>
  </div>
  <div style="display:flex;justify-content:center;align-items:center;">
    <figure style="margin:0;width:100%;max-width:480px;">
      <img src="/assets/placeholder/hero-editorial.svg" alt="단계별 강의 구조를 시각화한 추상 일러스트" style="width:100%;height:auto;border-radius:12px;display:block;">
      <figcaption style='font-family:"Pretendard",system-ui,sans-serif;font-size:12px;color:#9A8E84;margin-top:12px;text-align:center;letter-spacing:0.03em;'>실행 가능한 커리큘럼 설계</figcaption>
    </figure>
  </div>
</div>
  </div>
</section>
</body>
</html>
