<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>[V2] 비대칭 스플릿 임팩트 — 시안 미리보기</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* 시안용 inline 토큰 — 본 사이트 토큰을 덮어씀 */
  :root {
    --bg: #111111;
    --fg: #F0EEE9;
    --muted: #888888;
    --line: #333333;
    --brand: #F0EEE9;
    --brand-2: #CCCCCC;
    --accent: #CCCCCC;
    --soft: #1E1E1E;
    --font-family-sans: 'Pretendard', system-ui, sans-serif;
    --radius-card: 4px;
  }
  body { margin:0; padding:0; }
  .design-preview-banner {
    position:sticky; top:0; z-index:100;
    background:#111; color:#fff; padding:8px 16px;
    font:13px/1.4 system-ui, sans-serif;
    border-bottom:1px solid #333;
    display:flex; justify-content:space-between; align-items:center;
  }
  .design-preview-banner .vid { background:#FFD600; color:#111; padding:2px 8px; border-radius:4px; font-weight:700; }
  .design-preview-stage { padding:48px 0; background:var(--bg, #fff); min-height:80vh; }
  .design-preview-stage > .wrap { max-width:1100px; margin:0 auto; padding:0 24px; }
</style>
</head>
<body>
<div class="design-preview-banner">
  <span><span class="vid">V2</span> · 비대칭 스플릿 임팩트 · <em style="opacity:.7">굵은 타이포그래피와 좁은 그리드의 긴장감, 정보는 압축하고 시선은 집중</em></span>
  <span style="opacity:.6">target: home_intro</span>
</div>
<section class="design-preview-stage" role="region" aria-label="디자인 시안 미리보기">
  <div class="wrap">
<div style='background:#111111;padding:72px 24px 80px;font-family:var(--font-family-sans,"Pretendard",system-ui,sans-serif);'>
  <div style="max-width:1080px;margin:0 auto;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;">
      <div>
        <p style="font-size:10px;letter-spacing:0.25em;color:#666;text-transform:uppercase;margin:0 0 24px;">강의 목록 — 2개 코스 운영 중</p>
        <h2 style="font-size:clamp(32px,4.5vw,56px);font-weight:800;color:#F0EEE9;line-height:1.1;letter-spacing:-0.03em;margin:0 0 0;">실무에서<br>작동하는<br>Claude 강의.</h2>
      </div>
      <div style="padding-top:8px;">
        <p style="font-size:15px;line-height:1.75;color:#AAAAAA;margin:0 0 40px;">자동화 설계와 SOP 체계화. 두 코스는 각각 독립적으로 완결되며, 병행 수강하면 1인 사업 운영 전반을 커버할 수 있습니다.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <a href="/courses/claude-automation" style="display:block;padding:20px 24px;background:#1E1E1E;border:1px solid #333;text-decoration:none;border-radius:4px;">
            <span style="display:block;font-size:11px;letter-spacing:0.15em;color:#666;text-transform:uppercase;margin-bottom:8px;">코스 01</span>
            <span style="display:block;font-size:16px;font-weight:700;color:#F0EEE9;line-height:1.4;">Claude로 완성하는 1인 사업 자동화</span>
            <span style="display:block;font-size:13px;color:#888;margin-top:6px;">반복 업무를 구조로 바꾸는 워크플로우 설계</span>
          </a>
          <a href="/courses/claude-sop" style="display:block;padding:20px 24px;background:#1E1E1E;border:1px solid #333;text-decoration:none;border-radius:4px;">
            <span style="display:block;font-size:11px;letter-spacing:0.15em;color:#666;text-transform:uppercase;margin-bottom:8px;">코스 02</span>
            <span style="display:block;font-size:16px;font-weight:700;color:#F0EEE9;line-height:1.4;">Claude 워크플로우 SOP 만들기</span>
            <span style="display:block;font-size:13px;color:#888;margin-top:6px;">문서화하지 않으면 사라지는 지식을 시스템으로</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
  </div>
</section>
</body>
</html>
