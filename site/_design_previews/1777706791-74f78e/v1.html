<title>[V1] 에디토리얼 센터드 — 시안 미리보기</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* 시안용 inline 토큰 — 본 사이트 토큰을 덮어씀 */
  :root {
    --bg: #F7F6F4;
    --fg: #18181A;
    --muted: #888888;
    --line: #E8E6E1;
    --brand: #18181A;
    --brand-2: #4A4A4A;
    --accent: #4A4A4A;
    --soft: #E8E6E1;
    --font-family-sans: 'Pretendard', system-ui, sans-serif;
    --radius-card: 4px;
  }
  body { margin:0; padding:0; }
  .design-preview-banner {
    position:sticky; top:0; z-index:100;
    background:#111; color:#fff; padding:8px 16px;
    font:13px/1.4 system-ui, sans-serif;
    border-bottom:1px solid #333;
    display:flex; justify-content:space-between; align-items:center;
  }
  .design-preview-banner .vid { background:#FFD600; color:#111; padding:2px 8px; border-radius:4px; font-weight:700; }
  .design-preview-stage { padding:48px 0; background:var(--bg, #fff); min-height:80vh; }
  .design-preview-stage > .wrap { max-width:1100px; margin:0 auto; padding:0 24px; }
</style>
</head>
<body>
<div class="design-preview-banner">
  <span><span class="vid">V1</span> · 에디토리얼 센터드 · <em style="opacity:.7">학술 매거진 같은 진중한 텍스트 중심 레이아웃, 중앙 정렬의 고요함</em></span>
  <span style="opacity:.6">target: home_intro</span>
</div>
<section class="design-preview-stage" role="region" aria-label="디자인 시안 미리보기">
  <div class="wrap">
<div style='background:var(--bg,#F7F6F4);padding:80px 24px 96px;font-family:var(--font-family-sans,"Pretendard",system-ui,sans-serif);'>
  <div style="max-width:720px;margin:0 auto;text-align:center;">
    <p style="font-size:11px;letter-spacing:0.2em;color:#888;text-transform:uppercase;margin:0 0 32px;">Core Campus — 1인 사업가를 위한 실무 강의</p>

    <p style="font-size:16px;line-height:1.8;color:#4A4A4A;margin:0 0 48px;max-width:540px;margin-left:auto;margin-right:auto;">코어 캠퍼스는 1인 사업가가 Claude를 실무에 직접 연결할 수 있도록 설계된 강의를 제공합니다. 자동화 설계부터 SOP 문서화까지, 실제로 작동하는 워크플로우를 목표로 합니다.</p>
    <hr style="border:none;border-top:1px solid #E8E6E1;margin:0 0 48px;">
    <div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;">
      <a href="/courses/claude-automation" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#18181A;color:#F7F6F4;font-size:14px;font-weight:600;letter-spacing:0.01em;text-decoration:none;border-radius:4px;">Claude로 완성하는 1인 사업 자동화 <span style="font-size:16px;">→</span></a>
      <a href="/courses/claude-sop" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:transparent;color:#18181A;font-size:14px;font-weight:600;letter-spacing:0.01em;text-decoration:none;border-radius:4px;border:1px solid #C8C5BF;">Claude 워크플로우 SOP 만들기 <span style="font-size:16px;">→</span></a>

  </div>
