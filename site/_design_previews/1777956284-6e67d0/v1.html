<!doctype html>

<title>[V1] 에디토리얼 모던 — 시안 미리보기</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* 시안용 inline 토큰 — 본 사이트 토큰을 덮어씀 */
  :root {
    --bg: #FBF8F3;
    --fg: #1A1814;
    --brand: #3D2F1E;
    --brand-2: #5C4433;
    --accent: #B8860B;
    --soft: #F0E9DC;
    --muted: #7A6A58;
    --line: #E4D9C8;
    --font-family-sans: 'Pretendard', system-ui, sans-serif;
    --radius-card: 8px;
  }
  body { margin:0; padding:0; }
  .design-preview-banner {
    position:sticky; top:0; z-index:100;
    background:#111; color:#fff; padding:8px 16px;
    font:13px/1.4 system-ui, sans-serif;
    border-bottom:1px solid #333;
    display:flex; justify-content:space-between; align-items:center;
  }
  .design-preview-banner .vid { background:#FFD600; color:#111; padding:2px 8px; border-radius:4px; font-weight:700; }
  .design-preview-stage { padding:48px 0; background:var(--bg, #fff); min-height:80vh; }
  .design-preview-stage > .wrap { max-width:1100px; margin:0 auto; padding:0 24px; }
</style>
</head>
<body>
<div class="design-preview-banner">
  <span><span class="vid">V1</span> · 에디토리얼 모던 · <em style="opacity:.7">학술 매거진 표지 같은 진중함 — 텍스트 우선, 따뜻한 오프화이트 배경, 격식체 카피</em></span>
  <span style="opacity:.6">target: hero</span>
</div>
<section class="design-preview-stage" role="region" aria-label="디자인 시안 미리보기">
  <div class="wrap">
<div class="wrap" style="max-width:1200px;margin:0 auto;padding:80px 48px 72px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;background:var(--bg, #FBF8F3);"><div style="display:flex;flex-direction:column;gap:28px;"><div style="display:inline-flex;align-items:center;gap:10px;"><span style="display:inline-block;width:32px;height:2px;background:#B8860B;"></span><small style='font-family:"Pretendard",system-ui,sans-serif;font-size:12px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#B8860B;'>Core Campus · 실전 코스</small></div><h1 style='font-family:"Pretendard",system-ui,sans-serif;font-size:clamp(32px,4.5vw,56px);font-weight:800;line-height:1.15;color:#1A1814;letter-spacing:-0.02em;margin:0;'>하루 2시간을<br><em style="font-style:normal;color:#3D2F1E;border-bottom:3px solid #B8860B;">Claude</em>에게<br>돌려받으세요.</h1><p style='font-family:"Pretendard",system-ui,sans-serif;font-size:clamp(15px,1.8vw,18px);line-height:1.75;color:#3D2F1E;opacity:0.85;margin:0;max-width:440px;'>고객 문의 응대, 환불 협의, 반복 안내문 작성.<br>이 모든 CS 업무를 AI 자동화로 전환하는<br><strong>1인 사업가 전용 실전 키트</strong>입니다.</p><div style="display:flex;flex-direction:column;gap:12px;"><div style="display:flex;align-items:center;gap:12px;"><span style="width:20px;height:20px;border-radius:50%;background:#F0E9DC;border:2px solid #B8860B;display:inline-flex;align-items:center;justify-content:center;"><span style="width:8px;height:8px;border-radius:50%;background:#B8860B;"></span></span><span style='font-family:"Pretendard",system-ui,sans-serif;font-size:14px;color:#1A1814;'>CS 응답 자동화 프롬프트 템플릿 <strong>28종</strong> 제공</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:20px;height:20px;border-radius:50%;background:#F0E9DC;border:2px solid #B8860B;display:inline-flex;align-items:center;justify-content:center;"><span style="width:8px;height:8px;border-radius:50%;background:#B8860B;"></span></span><span style='font-family:"Pretendard",system-ui,sans-serif;font-size:14px;color:#1A1814;'>실제 셀러 운영 시나리오 기반 <strong>케이스 스터디</strong></span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:20px;height:20px;border-radius:50%;background:#F0E9DC;border:2px solid #B8860B;display:inline-flex;align-items:center;justify-content:center;"><span style="width:8px;height:8px;border-radius:50%;background:#B8860B;"></span></span><span style='font-family:"Pretendard",system-ui,sans-serif;font-size:14px;color:#1A1814;'>즉시 적용 가능한 <strong>SOP 워크플로</strong> 포함</span></div></div><div style="display:flex;align-items:center;gap:16px;padding-top:8px;"><a href="#enroll" style='display:inline-block;padding:16px 36px;background:#3D2F1E;color:#FBF8F3;font-family:"Pretendard",system-ui,sans-serif;font-size:15px;font-weight:700;letter-spacing:0.04em;text-decoration:none;border-radius:4px;'>수강 신청하기</a><a href="#curriculum" style='font-family:"Pretendard",system-ui,sans-serif;font-size:14px;color:#3D2F1E;text-decoration:none;border-bottom:1px solid #3D2F1E;padding-bottom:2px;'>커리큘럼 보기 →</a></div></div><figure style="margin:0;"><img src="/assets/placeholder/hero-editorial.svg" alt="CS 자동화 워크플로 일러스트" style="width:100%;border-radius:8px;display:block;background:#F0E9DC;"><figcaption style='margin-top:14px;font-family:"Pretendard",system-ui,sans-serif;font-size:12px;color:#3D2F1E;opacity:0.6;letter-spacing:0.05em;'>실제 수강생 CS 자동화 워크플로 예시</figcaption></figure></div>
  </div>
