<!doctype html>

<title>[V3] 서사 비대칭 — 시안 미리보기</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* 시안용 inline 토큰 — 본 사이트 토큰을 덮어씀 */
  :root {
    --bg: #F7F2EA;
    --fg: #2A2118;
    --brand: #8B5E3C;
    --brand-2: #6B4528;
    --accent: #C9874F;
    --soft: #EDE3D4;
    --muted: #8A7A68;
    --line: #DDD3C0;
    --font-family-sans: 'Pretendard', system-ui, sans-serif;
    --radius-card: 8px;
  }
  body { margin:0; padding:0; }
  .design-preview-banner {
    position:sticky; top:0; z-index:100;
    background:#111; color:#fff; padding:8px 16px;
    font:13px/1.4 system-ui, sans-serif;
    border-bottom:1px solid #333;
    display:flex; justify-content:space-between; align-items:center;
  }
  .design-preview-banner .vid { background:#FFD600; color:#111; padding:2px 8px; border-radius:4px; font-weight:700; }
  .design-preview-stage { padding:48px 0; background:var(--bg, #fff); min-height:80vh; }
  .design-preview-stage > .wrap { max-width:1100px; margin:0 auto; padding:0 24px; }
</style>
</head>
<body>
<div class="design-preview-banner">
  <span><span class="vid">V3</span> · 서사 비대칭 · <em style="opacity:.7">친근한 이야기체 카피와 비대칭 레이아웃 — 따뜻한 중간 톤, 이미지와 텍스트 균형</em></span>
  <span style="opacity:.6">target: hero</span>
</div>
<section class="design-preview-stage" role="region" aria-label="디자인 시안 미리보기">
  <div class="wrap">
<div class="wrap" style="max-width:1200px;margin:0 auto;padding:0 48px;background:var(--bg,#F7F2EA);"><div style="display:grid;grid-template-columns:5fr 7fr;min-height:580px;"><div style="display:flex;flex-direction:column;justify-content:center;padding:80px 48px 80px 0;gap:0;"><small style='font-family:"Pretendard",system-ui,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#C9874F;margin-bottom:20px;display:block;'>Core Campus</small><h1 style='font-family:"Pretendard",system-ui,sans-serif;font-size:clamp(22px,3vw,38px);font-weight:800;line-height:1.3;color:#2A2118;letter-spacing:-0.02em;margin:0 0 24px;'>오늘도 고객 문의<br>답하느라<br>정작 일 못 했나요?</h1><div style="width:40px;height:3px;background:#C9874F;margin-bottom:24px;border-radius:2px;"></div><p style='font-family:"Pretendard",system-ui,sans-serif;font-size:clamp(13px,1.5vw,15px);line-height:1.85;color:#2A2118;opacity:0.7;margin:0 0 32px;max-width:320px;'>1인 사업가의 하루 중 가장 소모적인 업무,<br>CS 응대. <strong style="color:#8B5E3C;">Claude로 CS 자동화</strong> 코스는<br>이 반복을 끊어드립니다.</p><a href="#enroll" style='display:inline-block;padding:15px 32px;background:#8B5E3C;color:#F7F2EA;font-family:"Pretendard",system-ui,sans-serif;font-size:14px;font-weight:700;text-decoration:none;border-radius:4px;width:fit-content;'>코스 살펴보기</a></div><div style="padding:56px 0 56px 56px;display:flex;flex-direction:column;gap:24px;justify-content:center;"><div style="border-radius:8px;background:#EDE3D4;"><img src="/assets/placeholder/hero-narrative-main.svg" alt="CS 자동화 흐름 시각화" style="width:100%;display:block;min-height:240px;"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div style="background:#EDE3D4;border-radius:8px;padding:20px 22px;"><p style='font-family:"Pretendard",system-ui,sans-serif;font-size:22px;font-weight:800;color:#8B5E3C;margin:0 0 4px;'>→ 12분</p><small style='font-family:"Pretendard",system-ui,sans-serif;font-size:12px;color:#2A2118;opacity:0.65;line-height:1.5;'>환불 요청 응답<br>평균 처리 시간</small></div><div style="background:#EDE3D4;border-radius:8px;padding:20px 22px;"><p style='font-family:"Pretendard",system-ui,sans-serif;font-size:22px;font-weight:800;color:#8B5E3C;margin:0 0 4px;'>28종</p><small style='font-family:"Pretendard",system-ui,sans-serif;font-size:12px;color:#2A2118;opacity:0.65;line-height:1.5;'>즉시 쓸 수 있는<br>프롬프트 템플릿</small></div><div style="background:#EDE3D4;border-radius:8px;padding:20px 22px;"><p style='font-family:"Pretendard",system-ui,sans-serif;font-size:22px;font-weight:800;color:#8B5E3C;margin:0 0 4px;'>4시간</p><small style='font-family:"Pretendard",system-ui,sans-serif;font-size:12px;color:#2A2118;opacity:0.65;line-height:1.5;'>전체 강의<br>수강 분량</small></div><div style="background:#C9874F;border-radius:8px;padding:20px 22px;"><p style='font-family:"Pretendard",system-ui,sans-serif;font-size:14px;font-weight:700;color:#F7F2EA;margin:0 0 6px;line-height:1.4;'>1인 사업가를 위한<br>실전 생존 키트</p><small style='font-family:"Pretendard",system-ui,sans-serif;font-size:11px;color:#F7F2EA;opacity:0.8;'>Core Campus 검수 완료</small></div></div></div></div></div>
  </div>
</section>
</body>
</html>
