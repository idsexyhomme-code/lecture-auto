<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>[V2] 비대칭 임팩트 — 시안 미리보기</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  /* 시안용 inline 토큰 — 본 사이트 토큰을 덮어씀 */
  :root {
    --bg: #0A0A0A;
    --fg: #F5F5F5;
    --muted: #8A8A8A;
    --line: #1E1E1E;
    --brand: #00E5BE;
    --brand-2: #141414;
    --accent: #FF3D5A;
    --soft: #141414;
    --font-family-sans: 'Pretendard', system-ui, sans-serif;
    --radius-card: 4px;
  }
  body { margin:0; padding:0; }
  .design-preview-banner {
    position:sticky; top:0; z-index:100;
    background:#111; color:#fff; padding:8px 16px;
    font:13px/1.4 system-ui, sans-serif;
    border-bottom:1px solid #333;
    display:flex; justify-content:space-between; align-items:center;
  }
  .design-preview-banner .vid { background:#FFD600; color:#111; padding:2px 8px; border-radius:4px; font-weight:700; }
  .design-preview-stage { padding:48px 0; background:var(--bg, #fff); min-height:80vh; }
  .design-preview-stage > .wrap { max-width:1100px; margin:0 auto; padding:0 24px; }
</style>
</head>
<body>
<div class="design-preview-banner">
  <span><span class="vid">V2</span> · 비대칭 임팩트 · <em style="opacity:.7">테크 유튜브 썸네일처럼 강렬하되 정보는 밀도 있게 응축된 비대칭 분할</em></span>
  <span style="opacity:.6">target: home_intro</span>
</div>
<section class="design-preview-stage" role="region" aria-label="디자인 시안 미리보기">
  <div class="wrap">
<div class="wrap" style='background:#0A0A0A;color:#F5F5F5;font-family:var(--font-family-sans,"Pretendard",system-ui,sans-serif);'>

  
  <div style="display:grid;grid-template-columns:5fr 4fr;min-height:480px;">

    
    <div style="padding:64px 48px;display:flex;flex-direction:column;justify-content:center;background:#0A0A0A;">
      
      <div style="width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,#00E5BE18 0%,transparent 70%);"></div>

      <span style="font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:#00E5BE;font-weight:700;margin-bottom:20px;display:block;">AI 실무 · Claude 특화</span>

      <h2 style="font-size:clamp(36px,5vw,64px);font-weight:900;line-height:1.05;letter-spacing:-0.04em;margin:0 0 28px;">
        <span style="display:block;">일하는 방식을</span>
        <span style="display:block;color:#00E5BE;">AI로 재설계</span>
        <span style="display:block;">하는 과정</span>
      </h2>

      <p style="font-size:15px;line-height:1.75;color:#8A8A8A;max-width:380px;margin:0 0 36px;">프롬프트 한 줄 이상의 이야기. Claude를 실제 업무 흐름에 통합하는 구조를 배웁니다.</p>

      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <a href="#start" style="display:inline-flex;align-items:center;gap:8px;background:#00E5BE;color:#0A0A0A;font-size:14px;font-weight:800;letter-spacing:0.02em;padding:14px 26px;border-radius:4px;text-decoration:none;">무료로 시작하기 →</a>
        <a href="#curriculum" style="display:inline-flex;align-items:center;gap:8px;background:transparent;color:#F5F5F5;font-size:14px;font-weight:600;padding:14px 26px;border-radius:4px;text-decoration:none;border:1px solid #2A2A2A;">커리큘럼 →</a>
      </div>
    </div>

    
    <div style="background:#141414;display:flex;flex-direction:column;justify-content:center;gap:3px;padding:3px;">

      
      <div style="flex:1;background:#1C1C1C;display:flex;align-items:center;justify-content:center;min-height:240px;">
        <img src="/assets/placeholder/home_intro-tech.svg" alt="AI 실무 시각화" style="width:100%;height:100%;opacity:0.7;">
        <div style="background:linear-gradient(135deg,transparent 60%,#00E5BE12 100%);"></div>
        <span style="font-size:9px;letter-spacing:0.16em;color:#00E5BE;opacity:0.7;">CORE · AI</span>
      </div>

      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;">
        <div style="background:#1C1C1C;padding:20px;">
          <p style="font-size:28px;font-weight:900;color:#00E5BE;margin:0 0 4px;letter-spacing:-0.03em;">28<span style="font-size:16px;">개</span></p>
          <p style="font-size:11px;color:#5A5A5A;margin:0;letter-spacing:0.04em;">실무 모듈</p>
        </div>
        <div style="background:#1C1C1C;padding:20px;">
          <p style="font-size:28px;font-weight:900;color:#F5F5F5;margin:0 0 4px;letter-spacing:-0.03em;">3,400<span style="font-size:16px;">+</span></p>
          <p style="font-size:11px;color:#5A5A5A;margin:0;letter-spacing:0.04em;">수강 중인 창업가</p>
        </div>
      </div>
    </div>

  </div>

  
  <div style="background:#141414;padding:16px 48px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-top:1px solid #1E1E1E;">
    <span style="font-size:10px;color:#5A5A5A;letter-spacing:0.12em;margin-right:8px;">다루는 주제</span>
    <span style="font-size:12px;color:#8A8A8A;background:#1E1E1E;padding:5px 12px;border-radius:2px;">Claude 프롬프트</span>
    <span style="font-size:12px;color:#8A8A8A;background:#1E1E1E;padding:5px 12px;border-radius:2px;">업무 자동화</span>
    <span style="font-size:12px;color:#8A8A8A;background:#1E1E1E;padding:5px 12px;border-radius:2px;">콘텐츠 생산</span>
    <span style="font-size:12px;color:#8A8A8A;background:#1E1E1E;padding:5px 12px;border-radius:2px;">제안서·보고서</span>
    <span style="font-size:12px;color:#00E5BE;background:#00E5BE1A;padding:5px 12px;border-radius:2px;border:1px solid #00E5BE33;">1인 운영 특화</span>
  </div>

</div>
  </div>
</section>
</body>
</html>
